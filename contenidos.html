<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Contenidos — Planeta Gómez Casa</title>
    <!-- Google Fonts: Space Grotesk & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Shared stylesheet -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Custom layout for List page */
        .selector-header {
            padding: 8rem 0 2rem;
            text-align: center;
        }
        
        .controls-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 20px;
            backdrop-filter: blur(12px);
            margin-bottom: 3rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            box-shadow: var(--card-shadow);
        }
        
        .filter-row {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .search-box {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.8rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: var(--font-body);
            outline: none;
            transition: var(--transition-normal);
        }
        
        .search-box input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 18px;
            height: 18px;
        }
        
        .btn-filter {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.5rem 1.1rem;
            font-size: 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition-normal);
            font-family: var(--font-heading);
            font-weight: 500;
        }
        
        .btn-filter.active, .btn-filter:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--text-primary);
            box-shadow: var(--glow-primary);
        }

        .counter-row {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }
        
        .selector-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            padding-bottom: 6rem;
        }
    </style>
</head>
<body>
    <!-- Canvas starfield background -->
    <canvas id="starfield"></canvas>
    
    <!-- Subtle glow dots -->
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <!-- Header -->
    <header class="main-header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <i data-lucide="orbit" class="icon-spin"></i>
                </div>
                <span class="logo-text">Planeta <span class="accent-text">Gómez Casa</span></span>
            </a>
            
            <a href="index.html" class="btn btn-nav glow-effect">
                <i data-lucide="arrow-left"></i>
                <span>Volver a la Web</span>
            </a>
        </div>
    </header>

    <main class="container">
        <!-- Page title -->
        <div class="selector-header">
            <h1 class="gradient-text">Galería de Contenidos</h1>
            <p style="color: var(--text-muted); max-width: 600px; margin: 0.5rem auto 0;">
                Explorá todos los contenidos exclusivos que forman parte del cosmos de Planeta Gómez Casa.
            </p>
        </div>

        <!-- Filters and search -->
        <div class="controls-container">
            <div class="search-box">
                <i data-lucide="search"></i>
                <input type="text" id="search-input" placeholder="Buscar por título o descripción...">
            </div>
            
            <div class="filter-row" id="tag-filters">
                <button class="btn-filter active" data-tag="ALL">Todos</button>
                <button class="btn-filter" data-tag="PROCESO">Proceso Creativo</button>
                <button class="btn-filter" data-tag="PODCAST">Podcast</button>
                <button class="btn-filter" data-tag="GASTRONOMÍA">Gastronomía</button>
                <button class="btn-filter" data-tag="VISUALES">Visuales</button>
                <button class="btn-filter" data-tag="EXCLUSIVO">Otros Exclusivos</button>
            </div>

            <div class="counter-row" id="counter-display">
                Mostrando 0 de 114 contenidos
            </div>
        </div>

        <!-- Contents Grid -->
        <div class="selector-grid" id="grid-container">
            <!-- Rendered dynamically -->
        </div>
    </main>

    <!-- Scripts -->
    <script src="all-contents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize Lucide Icons
            lucide.createIcons();

            // Parallax Starfield Background Canvas
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            let stars = [];
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            for (let i = 0; i < 70; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5 + 0.2,
                    speedX: (Math.random() - 0.5) * 0.1,
                    speedY: (Math.random() - 0.5) * 0.1,
                    opacity: Math.random() * 0.6 + 0.4
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(star => {
                    ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fill();
                    star.x += star.speedX;
                    star.y += star.speedY;
                    if (star.x < 0) star.x = canvas.width;
                    if (star.x > canvas.width) star.x = 0;
                    if (star.y < 0) star.y = canvas.height;
                    if (star.y > canvas.height) star.y = 0;
                });
                requestAnimationFrame(draw);
            }
            draw();

            const gridContainer = document.getElementById('grid-container');
            const searchInput = document.getElementById('search-input');
            const counterDisplay = document.getElementById('counter-display');
            
            let currentTag = 'ALL';
            let searchQuery = '';

            // Render function
            function renderGrid() {
                gridContainer.innerHTML = '';
                
                // Filter the list
                const filtered = ALL_CONTENTS.filter(item => {
                    const matchesTag = currentTag === 'ALL' || item.tag === currentTag;
                    const matchesSearch = item.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                          item.description.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchesTag && matchesSearch;
                });

                counterDisplay.textContent = `Mostrando ${filtered.length} de ${ALL_CONTENTS.length} contenidos`;

                filtered.forEach(item => {
                    const card = document.createElement('a');
                    card.href = 'index.html#suscribite';
                    card.className = `preview-card`;
                    card.innerHTML = `
                        <div class="card-thumbnail" style="background-image: url('${item.image}');">
                            <span class="card-badge">${item.tag}</span>
                        </div>
                        <div class="card-info">
                            <h3>${item.title}</h3>
                            <p>${item.description}</p>
                        </div>
                    `;
                    gridContainer.appendChild(card);
                });
                
                lucide.createIcons();
            }

            // Initial render
            renderGrid();

            // Search filter handler
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderGrid();
            });

            // Tag filter handler
            const filtersContainer = document.getElementById('tag-filters');
            filtersContainer.addEventListener('click', (e) => {
                if (e.target.classList.contains('btn-filter')) {
                    document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
                    e.target.classList.add('active');
                    currentTag = e.target.getAttribute('data-tag');
                    renderGrid();
                }
            });
        });
    </script>
</body>
</html>
